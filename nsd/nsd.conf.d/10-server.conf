# 10-server.conf — NSD server directives, control interface, health check zone
#
# Do not edit this file for host-specific changes — it is tracked in git
# and changes will be overwritten on git pull.
# Add overrides to nsd/custom.conf.d/local.conf instead.

server:
    # Listen on all interfaces
    ip-address: 0.0.0.0
    ip-address: ::0
    port: 53

    # Protocol support
    do-ip4: yes
    do-ip6: yes

    # Identity hardening
    hide-version: yes
    identity: ""
    refuse-any: yes

    # Performance
    server-count: 2
    tcp-count: 100

    # Logging — stderr, captured by Docker
    verbosity: 1
    log-only-syslog: no

    # Zone files managed by nsd-manager are written here
    zonesdir: "/etc/nsd/zones"

    # Health check zone — baked into image, always present
    # Decouples Docker healthcheck from any real served zone
    zone:
        name: "health.check.nsd."
        zonefile: "/etc/nsd/health.check.nsd.zone"

# Control interface — loopback only.
# TLS keys are generated at runtime into /etc/nsd/keys/ (shared nsd-keys volume)
# so nsd-manager can reach nsd-control with matching credentials.
# Acceptable on a dedicated single-purpose host.
remote-control:
    control-enable: yes
    control-interface: 127.0.0.1
    control-port: 8952
    server-key-file: "/etc/nsd/keys/nsd_server.key"
    server-cert-file: "/etc/nsd/keys/nsd_server.pem"
    control-key-file: "/etc/nsd/keys/nsd_control.key"
    control-cert-file: "/etc/nsd/keys/nsd_control.pem"
