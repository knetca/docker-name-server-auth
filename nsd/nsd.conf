# nsd.conf — base configuration for docker-name-server-auth
#
# Loads tracked config from nsd.conf.d/ then host-specific overrides
# from custom.conf.d/. Do not add directives here directly.
#
# Do not edit this file for host-specific changes — it is tracked in git
# and changes will be overwritten on git pull.
# Add overrides to nsd/custom.conf.d/local.conf instead.

include: "/etc/nsd/nsd.conf.d/*.conf"
include: "/etc/nsd/custom.conf.d/*.conf"
