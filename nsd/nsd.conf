# nsd.conf — base configuration for docker-name-server-auth
#
# Loads tracked config from nsd.conf.d/ then runtime-generated config
# from nsd-runtime/ then host-specific overrides from custom.conf.d/.
#
# nsd.conf.d/  — bind-mounted from repo, tracked in git
# nsd-runtime/ — named volume shared with nsd-manager, runtime-generated
#                (20-zones.conf written by nsd-manager)
# custom.conf.d/ — bind-mounted, host-specific overrides
#
# Do not edit this file for host-specific changes — it is tracked in git
# and changes will be overwritten on git pull.
# Add overrides to nsd/custom.conf.d/local.conf instead.

include: "/etc/nsd/nsd.conf.d/*.conf"
include: "/etc/nsd/nsd-runtime/*.conf"
include: "/etc/nsd/custom.conf.d/*.conf"
