---
# docker-name-server-auth — NSD authoritative DNS + nsd-manager
#
# Both services built locally from Alpine. Single ALPINE_TAG pin in .env.
# network_mode: host — DNS (udp/53, tcp/53) requires host networking.
# nsd-manager reaches nsd-control at 127.0.0.1:8952 via host network stack.
# nsd-control is no-TLS, loopback only — acceptable on a dedicated host.

services:

  nsd:
    build:
      context: ./build/nsd
      args:
        ALPINE_TAG: ${ALPINE_TAG}
    image: dns-nsd:${ALPINE_TAG}
    container_name: nsd
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nsd/nsd.conf:/etc/nsd/nsd.conf:ro
      - ./nsd/nsd.conf.d:/etc/nsd/nsd.conf.d:ro
      - ./nsd/custom.conf.d:/etc/nsd/custom.conf.d:ro
      - zones:/etc/nsd/zones
    healthcheck:
      test: ["CMD", "drill", "@127.0.0.1", "health.check.nsd", "A"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nsd-manager:
    build:
      context: ./build/manager
      args:
        ALPINE_TAG: ${ALPINE_TAG}
    image: dns-nsd-manager:${ALPINE_TAG}
    container_name: nsd-manager
    restart: unless-stopped
    depends_on:
      nsd:
        condition: service_healthy
    network_mode: host
    environment:
      ZONES_REPO: ${ZONES_REPO}
      ZONES_BRANCH: ${ZONES_BRANCH:-main}
      ZONES_CRON: ${ZONES_CRON:-*/5 * * * *}
      TZ: ${TZ:-UTC}
    volumes:
      - ./manager/ssh:/root/.ssh:ro
      - zones:/etc/nsd/zones
      - ./nsd/nsd.conf.d:/etc/nsd/nsd.conf.d
      - zones-git:/var/lib/nsd-manager/zones

volumes:
  zones:
  zones-git:
